version: '3.9'

services:
  api:
    build: .
    container_name: multi-agent-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./chroma_research_db:/app/chroma_research_db  # Persist ChromaDB data
      - .:/app
    restart: unless-stopped
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    # Optional: increase timeout for long research queries
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --timeout-keep-alive 120