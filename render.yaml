version: 1

services:
  # ===================== BACKEND =====================
  - type: web
    env: python
    name: multi-agent-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587

  # ===================== FRONTEND =====================
  - type: web
    name: multi-agent-frontend
    runtime: static
    buildCommand: ""                    # No build needed
    staticPublishPath: ./static         # Serves landing.html at root
    autoDeploy: true